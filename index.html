<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: var(--bg);
    color: var(--text);
}

:root {
    --bg: #f4f6f9;
    --text: #000;
    --card: #fff;
}

.dark {
    --bg: #1e1e2f;
    --text: #fff;
    --card: #2a2a3d;
}

.auth {
    width: 320px;
    margin: 100px auto;
    padding: 20px;
    background: var(--card);
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
}

button {
    padding: 10px;
    width: 100%;
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 5px;
}

button:hover { opacity: 0.8; }

.dashboard { display:none; padding:20px; }

.card {
    background: var(--card);
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.row {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.row > div { flex:1; min-width:150px; }

table {
    width:100%;
    border-collapse: collapse;
}

td, th {
    padding:10px;
    border-bottom:1px solid gray;
    text-align:center;
}

.top {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.small-btn {
    width:auto;
    padding:5px 10px;
}

.alert {
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth" id="auth">
    <h2 id="title">Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="auth()">Login</button>
    <p onclick="toggle()" style="cursor:pointer;color:blue">Switch</p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dash">

<div class="top">
    <h2>Expense Tracker Pro</h2>
    <div>
        <button class="small-btn" onclick="toggleDark()">🌙</button>
        <button class="small-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="card">
<h3>Add Expense</h3>
<input id="t" placeholder="Title">
<input id="a" type="number" placeholder="Amount">
<input id="d" type="date">
<select id="c">
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
</select>
<button onclick="add()">Add</button>
</div>

<div class="card">
<h3>Budget Limit</h3>
<input id="budget" type="number" placeholder="Set Monthly Budget">
<button onclick="setBudget()">Set</button>
<p id="warn"></p>
</div>

<div class="card">
<h3>Filters</h3>
<input id="fc" placeholder="Category">
<input id="min" type="number" placeholder="Min">
<input id="max" type="number" placeholder="Max">
<input id="fd" type="date">
<button onclick="render()">Apply</button>
</div>

<div class="card">
<h3>Charts</h3>
<canvas id="pie"></canvas>
<canvas id="bar"></canvas>
</div>

<div class="card">
<h3>Expenses</h3>
<button onclick="pdf()">PDF</button>
<button onclick="excel()">Excel</button>

<table>
<thead>
<tr>
<th>Title</th><th>Amount</th><th>Date</th><th>Cat</th><th>Action</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>
let user = "";
let data = [];
let pie, bar;
let budget = 0;

let isLogin = true;
function toggle(){
    isLogin = !isLogin;
    document.getElementById("title").innerText = isLogin ? "Login":"Signup";
}

function auth(){
    let u = user = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    let users = JSON.parse(localStorage.getItem("u")||"{}");

    if(isLogin){
        if(users[u]===p){
            start(u);
        } else alert("Wrong");
    } else {
        users[u]=p;
        localStorage.setItem("u",JSON.stringify(users));
        alert("Created");
        toggle();
    }
}

function start(u){
    user=u;
    document.getElementById("auth").style.display="none";
    document.getElementById("dash").style.display="block";
    data = JSON.parse(localStorage.getItem("e_"+user)||"[]");
    render();
}

function logout(){location.reload();}

function add(){
    data.push({
        t:t.value,
        a:+a.value,
        d:d.value,
        c:c.value
    });
    save();
    render();
}

function del(i){
    data.splice(i,1);
    save();
    render();
}

function save(){
    localStorage.setItem("e_"+user,JSON.stringify(data));
}

function setBudget(){
    budget = +document.getElementById("budget").value;
    render();
}

function render(){
    let f = data.filter(e=>{
        return (!fc.value||e.c.includes(fc.value))
        && (!min.value||e.a>=min.value)
        && (!max.value||e.a<=max.value)
        && (!fd.value||e.d==fd.value);
    });

    let total = f.reduce((s,e)=>s+e.a,0);
    warn.innerText = budget && total>budget ? "⚠ Budget Exceeded!" : "";

    tb.innerHTML = f.map((e,i)=>
        `<tr>
        <td>${e.t}</td>
        <td>${e.a}</td>
        <td>${e.d}</td>
        <td>${e.c}</td>
        <td><button onclick="del(${i})">X</button></td>
        </tr>`
    ).join("");

    chart(f);
}

function chart(f){
    let cat={};
    let month={};

    f.forEach(e=>{
        cat[e.c]=(cat[e.c]||0)+e.a;

        let m=e.d?.slice(0,7);
        month[m]=(month[m]||0)+e.a;
    });

    if(pie) pie.destroy();
    if(bar) bar.destroy();

    pie=new Chart(pieCtx(),{
        type:"pie",
        data:{labels:Object.keys(cat),
        datasets:[{data:Object.values(cat)}]}
    });

    bar=new Chart(barCtx(),{
        type:"bar",
        data:{labels:Object.keys(month),
        datasets:[{data:Object.values(month)}]}
    });
}

function pieCtx(){return document.getElementById("pie");}
function barCtx(){return document.getElementById("bar");}

function toggleDark(){
    document.body.classList.toggle("dark");
}

function pdf(){
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();
    doc.text("Expense Report",10,10);
    data.forEach((e,i)=>{
        doc.text(`${e.t} ${e.a} ${e.c}`,10,20+i*10);
    });
    doc.save("expenses.pdf");
}

function excel(){
    let ws = XLSX.utils.json_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Expenses");
    XLSX.writeFile(wb,"expenses.xlsx");
}
</script>

</body>
  </html>
